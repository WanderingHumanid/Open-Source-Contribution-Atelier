name: Community Automation

on:
  pull_request:
    types: [opened, reopened]
  issues:
    types: [opened]

jobs:
  pr-review:
    name: Auto Review PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "👋 Thanks for your PR! Please:\n- Link the related issue\n- Ensure tests pass\n- Follow commit message guidelines\n- Add documentation if needed\nLabels will be synced with the related issue."
            })

  pr-label-sync:
    name: Sync Labels from Issue
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (pr.body) {
              const issueMatch = pr.body.match(/#(\d+)/);
              if (issueMatch) {
                const issueNumber = parseInt(issueMatch[1]);
                const issueLabels = await github.rest.issues.listLabelsOnIssue({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber
                });
                const labels = issueLabels.data.map(l => l.name);
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: labels
                });
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  assignees: [pr.user.login]
                });
              }
            }

  issue-etiquette:
    name: Auto Comment on Issues
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🙏 Thanks for opening an issue!\nPlease include:\n- Clear description\n- Steps to reproduce\n- Expected vs actual behavior\n- Screenshots/logs if possible\n\nLabels will be added automatically."
            })

  issue-labels:
    name: Auto Label Issues
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            let labels = ["ssoc26"];
            const title = issue.title.toLowerCase();
            if (title.includes("doc")) labels.push("docs");
            if (title.includes("easy")) labels.push("easy");
            else if (title.includes("medium")) labels.push("medium");
            else if (title.includes("hard")) labels.push("hard");
            if (title.includes("first")) labels.push("good first issue");
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels
            });

  dependabot:
    name: Dependabot Updates
    runs-on: ubuntu-latest
    steps:
      - name: Dependabot config reminder
        run: echo "Ensure .github/dependabot.yml is configured for npm and pip updates."
